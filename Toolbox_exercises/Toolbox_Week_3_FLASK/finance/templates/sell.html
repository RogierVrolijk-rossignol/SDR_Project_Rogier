{% extends "layout.html" %}

{% block main %}

<h1>Sell</h1>

<form method="POST">
    <select name="symbol">
        <option value="">Choose stock</option>

        {% for stock in stocks %}
            <option value="{{ stock.symbol }}">{{ stock.symbol }}</option>
        {% endfor %}
    </select>

    <input type="number" name="shares" placeholder="Shares">
    <input type="submit" value="Sell">
</form>

{% endblock %}
